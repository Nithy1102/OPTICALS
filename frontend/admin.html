<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Rajesh Opticals</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root{ --glass:rgba(255,255,255,0.08); --border:rgba(255,255,255,0.15); --cyan:#ffffff; --text:#ffffff; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Roboto Mono',monospace; background:radial-gradient(circle at top right,#216c8d,#0d1b2a); color:var(--text); display:flex; min-height:100vh; }
.sidebar{ width:260px; background:var(--glass); backdrop-filter:blur(20px); border-right:1px solid var(--border); padding:30px 0; display:flex; flex-direction:column; align-items:center; position:fixed; height:100vh; }
.logo{ font-size:20px; color:var(--cyan); font-weight:600; margin-bottom:8px; }
.logo-img{ width:55px; margin-bottom:10px; }
.sidebar ul{ list-style:none; padding:0; width:100%; margin-top:20px; }
.sidebar ul li{ padding:14px 25px; cursor:pointer; display:flex; gap:15px; align-items:center; color:#fff8f8; transition:.3s; }
.sidebar ul li:hover,.sidebar ul li.active{ background:var(--glass); color:var(--cyan); border-left:3px solid var(--cyan); }
.sidebar i{ width:22px; text-align:center; }
.main{ flex:1; padding:40px; margin-left:260px; }
.main h1{ color:var(--cyan); margin-bottom:28px; font-size:24px; }
.card{ background:var(--glass); backdrop-filter:blur(15px); border:1px solid var(--border); border-radius:15px; padding:28px; margin-bottom:28px; }
.card h3{ margin-bottom:20px; color:#00e0ff; font-size:15px; }
.form{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; }
.form input,.form select{ padding:11px 14px; border:1px solid var(--border); border-radius:8px; background:rgba(255,255,255,0.08); color:white; font-family:inherit; outline:none; }
.form input::placeholder{ color:#aaa; }
.form button{ padding:11px 20px; border:none; border-radius:8px; background:#00e0ff; cursor:pointer; font-weight:bold; font-family:inherit; color:#0d1b2a; }
.table-box{ overflow-x:auto; }
table{ width:100%; border-collapse:collapse; }
th{ background:rgba(255,255,255,0.12); padding:13px 16px; text-align:left; font-size:12px; color:#00e0ff; }
td{ padding:13px 16px; border-top:1px solid var(--border); font-size:13px; }
tr:hover td{ background:rgba(255,255,255,0.04); }
.btn{ padding:5px 11px; border-radius:6px; border:none; cursor:pointer; font-size:11px; font-weight:bold; }
.edit-btn{ background:#f39c12; color:white; }
.del-btn{ background:#e74c3c; color:white; }
.role-badge{ padding:3px 10px; border-radius:20px; font-size:11px; font-weight:bold; }
.role-admin{ background:rgba(0,224,255,0.2); color:#00e0ff; }
.role-staff{ background:rgba(243,156,18,0.2); color:#f39c12; }
.error-msg{ color:#ff6b6b; font-size:12px; margin-top:10px; }
.success-msg{ color:#2ecc71; font-size:12px; margin-top:10px; }
.loading{ text-align:center; padding:30px; color:#aaa; }
.access-denied{ text-align:center; padding:80px; color:#e74c3c; }

/* Note box */
.note{ background:rgba(0,224,255,0.08); border:1px solid rgba(0,224,255,0.2); border-radius:10px; padding:14px 18px; font-size:12px; color:#aaa; margin-bottom:20px; line-height:1.6; }
.note strong{ color:#00e0ff; }
</style>
</head>
<body>

<div class="sidebar">
  <img src="assets/logo.png" class="logo-img" onerror="this.style.display='none'">
  <div class="logo">Rajesh Opticals</div>
  <ul>
    <li onclick="location.href='dashboard.html'"><i class="fas fa-home"></i> Dashboard</li>
    <li onclick="location.href='patient-records.html'"><i class="fas fa-user-injured"></i> Patient Records</li>
    <li onclick="location.href='activity-log.html'"><i class="fas fa-history"></i> Activity Log</li>
    <li class="active"><i class="fas fa-user-shield"></i> Admin</li>
    <li onclick="location.href='notifications.html'"><i class="fas fa-bell"></i> Notifications</li>
    <li onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
  </ul>
</div>

<div class="main">
  <h1>Admin Management</h1>
  <div id="adminContent"><div class="loading">Checking permissions...</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
(async () => {
  await requireAuth();
  const user = await getCurrentUser();

  if (user?.role !== "admin") {
    document.getElementById("adminContent").innerHTML = `
      <div class="access-denied">
        <i class="fas fa-lock" style="font-size:52px;margin-bottom:16px;display:block;"></i>
        <div style="font-size:16px;">Admin access required.</div>
        <div style="font-size:13px;color:#aaa;margin-top:8px;">You are logged in as Staff.</div>
      </div>`;
    return;
  }

  document.getElementById("adminContent").innerHTML = `
    <div class="note">
      <strong>ℹ️ Note:</strong> To create new users, go to
      <strong>USE CODING</strong>.
      After creating, their profile appears here automatically. You can update their name and role below.
    </div>

    <div class="card">
      <h3><i class="fas fa-users"></i> System Users</h3>
      <div class="table-box">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
          <tbody id="usersBody"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>`;

  loadUsers();
})();

async function loadUsers() {
  const { data, error } = await sb
    .from("profiles")
    .select("id, name, role, created_at, auth_users:id(email)")
    .order("created_at");

  // Fallback: just get profiles without join
  const { data: profiles } = await sb.from("profiles").select("*").order("created_at");

  const tbody = document.getElementById("usersBody");
  if (!profiles?.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="loading">No users found.</td></tr>`;
    return;
  }

  tbody.innerHTML = profiles.map(u => `
    <tr>
      <td>${u.name || "—"}</td>
      <td style="color:#aaa;font-size:12px;">${u.id}</td>
      <td><span class="role-badge role-${u.role}">${u.role}</span></td>
      <td style="color:#aaa;font-size:12px;">${new Date(u.created_at).toLocaleDateString("en-IN")}</td>
      <td>
        <button class="btn edit-btn" onclick="editUser('${u.id}','${u.name}','${u.role}')">Edit</button>
      </td>
    </tr>
  `).join("");
}

async function editUser(id, name, role) {
  const newName = prompt("Update name:", name);
  if (newName === null) return;
  const newRole = prompt("Update role (admin/staff):", role);
  if (newRole === null || !["admin","staff"].includes(newRole)) {
    alert("Role must be 'admin' or 'staff'"); return;
  }

  const { error } = await sb.from("profiles").update({ name: newName, role: newRole }).eq("id", id);
  if (!error) loadUsers();
  else alert(error.message);
}
</script>
</body>
</html>
