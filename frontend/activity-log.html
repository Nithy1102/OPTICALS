<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Log — Rajesh Opticals</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root{ --glass:rgba(255,255,255,0.08); --border:rgba(255,255,255,0.15); --cyan:#00e0ff; --text:#e0e0e0; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Roboto Mono',monospace; background:radial-gradient(circle at top right,#216c8d,#0d1b2a); color:var(--text); display:flex; min-height:100vh; }
.sidebar{ width:260px; background:var(--glass); backdrop-filter:blur(20px); border-right:1px solid var(--border); padding:30px 0; display:flex; flex-direction:column; align-items:center; position:fixed; height:100vh; }
.logo{ font-size:20px; color:var(--cyan); font-weight:600; margin-bottom:8px; }
.logo-img{ width:55px; margin-bottom:10px; }
.sidebar ul{ list-style:none; padding:0; width:100%; margin-top:20px; }
.sidebar ul li{ padding:14px 25px; cursor:pointer; display:flex; gap:15px; align-items:center; color:#aaa; transition:.3s; }
.sidebar ul li:hover,.sidebar ul li.active{ background:var(--glass); color:var(--cyan); border-left:3px solid var(--cyan); }
.sidebar i{ width:22px; text-align:center; }
.main{ flex:1; padding:40px; margin-left:260px; }
.main h1{ color:var(--cyan); margin-bottom:28px; font-size:24px; }
.top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.clear-btn{ padding:10px 20px; background:#e74c3c; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold; font-family:inherit; }
.card{ background:var(--glass); backdrop-filter:blur(15px); border:1px solid var(--border); border-radius:15px; padding:24px; }
.table-box{ overflow-x:auto; }
table{ width:100%; border-collapse:collapse; }
th{ background:rgba(0,0,0,0.3); padding:13px 16px; text-align:left; font-size:12px; color:var(--cyan); }
td{ padding:13px 16px; border-top:1px solid var(--border); font-size:13px; }
tr:hover td{ background:rgba(255,255,255,0.04); }
.badge{ padding:3px 10px; border-radius:20px; font-size:11px; font-weight:bold; }
.badge-Login  { background:rgba(46,204,113,0.2);  color:#2ecc71; }
.badge-Logout { background:rgba(231,76,60,0.2);   color:#e74c3c; }
.badge-Create { background:rgba(0,224,255,0.2);   color:#00e0ff; }
.badge-Edit   { background:rgba(243,156,18,0.2);  color:#f39c12; }
.badge-Delete { background:rgba(155,89,182,0.2);  color:#9b59b6; }
.loading{ text-align:center; padding:40px; color:#aaa; }
</style>
</head>
<body>

<div class="sidebar">
  <img src="assets/logo.png" class="logo-img" onerror="this.style.display='none'">
  <div class="logo">Rajesh Opticals</div>
  <ul>
    <li onclick="location.href='dashboard.html'"><i class="fas fa-home"></i> Dashboard</li>
    <li onclick="location.href='patient-records.html'"><i class="fas fa-user-injured"></i> Patient Records</li>
    <li class="active"><i class="fas fa-history"></i> Activity Log</li>
    <li onclick="location.href='admin.html'"><i class="fas fa-user-shield"></i> Admin</li>
    <li onclick="location.href='notifications.html'"><i class="fas fa-bell"></i> Notifications</li>
    <li onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
  </ul>
</div>

<div class="main">
  <h1>System Activity Log</h1>
  <div class="top-bar">
    <span id="countLabel" style="color:#aaa;font-size:13px;"></span>
    <button class="clear-btn" id="clearBtn" onclick="clearLogs()"><i class="fas fa-trash"></i> Clear Logs</button>
  </div>
  <div class="card">
    <div class="table-box">
      <table>
        <thead><tr><th>User</th><th>Role</th><th>Status</th><th>Action</th><th>Time</th></tr></thead>
        <tbody id="logBody"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
(async () => {
  await requireAuth();
  const user = await getCurrentUser();
  if (user?.role !== "admin") document.getElementById("clearBtn").style.display = "none";
  loadLogs();
})();

function fmt(t) {
  return new Date(t).toLocaleString("en-IN", { dateStyle:"medium", timeStyle:"short" });
}

async function loadLogs() {
  const { data, error } = await sb
    .from("activity_log").select("*").order("time", { ascending: false });

  const tbody = document.getElementById("logBody");
  document.getElementById("countLabel").textContent = `${data?.length || 0} log entries`;

  if (error || !data?.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="loading">No activity logs found.</td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(l => `
    <tr>
      <td>${l.user_name}</td>
      <td>${l.user_role}</td>
      <td>${l.status}</td>
      <td><span class="badge badge-${l.action}">${l.action}</span></td>
      <td>${fmt(l.time)}</td>
    </tr>
  `).join("");
}

async function clearLogs() {
  if (!confirm("Clear all activity logs? This cannot be undone.")) return;
  const { error } = await sb.from("activity_log").delete().neq("id", "00000000-0000-0000-0000-000000000000");
  if (!error) loadLogs();
  else alert(error.message);
}
</script>
</body>
</html>
